imports:
    - { resource: "services/forms.yml" }
    - { resource: "services/installer.yml" }
    - { resource: "services/commands.yml" }
    - { resource: "services/import_rules.yml" }

services:
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Event\EventDispatcher:
        arguments:
            - '@event_dispatcher'

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Service\FieldSelection:
        public: true

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactoryInterface: '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactory'
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactory: ~

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Importer\ImporterInterface: '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Importer\Importer'
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Importer\Importer:
        arguments:
            - '@data_definitions.registry.provider'
            - '@data_definitions.registry.filter'
            - '@data_definitions.registry.runner'
            - '@data_definitions.registry.interpreter'
            - '@data_definitions.registry.setter'
            - '@data_definitions.registry.cleaner'
            - '@data_definitions.registry.loader'
            - '@data_definitions.registry.persister'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Event\EventDispatcher'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactoryInterface'
            - '@logger'
            - '@opendxp.model.factory'
            - '@opendxp_ecommerce.expression_language'
            - '@messenger.default_bus'
        tags:
            - { name: monolog.logger, channel: import_definition }
            - { name: 'kernel.event_listener', event: 'data_definitions.stop', method: 'stop' }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Exporter\ExporterInterface: '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Exporter\Exporter'
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Exporter\Exporter:
        arguments:
            - '@data_definitions.registry.fetcher'
            - '@data_definitions.registry.export_runner'
            - '@data_definitions.registry.interpreter'
            - '@data_definitions.registry.getter'
            - '@data_definitions.registry.export_provider'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactoryInterface'
            - '@event_dispatcher'
            - '@logger'
        tags:
            - { name: monolog.logger, channel: export_definition }
            - { name: 'kernel.event_listener', event: 'data_definitions.stop', method: 'stop' }

    ### Registries
    data_definitions.registry.provider:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        public: true
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\ImportProviderInterface
            - 'Import Definition Providers'

    data_definitions.form.registry.provider:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    data_definitions.registry.export_provider:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\ExportProviderInterface
            - 'Import Definition Export Providers'

    data_definitions.form.registry.export_provider:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    data_definitions.registry.loader:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Loader\LoaderInterface
            - 'Import Definition Loaders'

    data_definitions.registry.cleaner:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Cleaner\CleanerInterface
            - 'Import Definition Cleaners'

    data_definitions.registry.filter:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Filter\FilterInterface
            - 'Import Definition Filters'

    data_definitions.registry.interpreter:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\InterpreterInterface
            - 'Import Definition Interpreters'

    data_definitions.form.registry.interpreter:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    data_definitions.registry.setter:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\SetterInterface
            - 'Import Definition Setters'

    data_definitions.form.registry.setter:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    data_definitions.registry.getter:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Getter\GetterInterface
            - 'Import Definition Getters'

    data_definitions.form.registry.getter:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    data_definitions.registry.fetcher:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Fetcher\FetcherInterface
            - 'Import Definition Fetchers'

    data_definitions.form.registry.fetcher:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    data_definitions.registry.runner:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Runner\RunnerInterface
            - 'Import Definition Runners'

    data_definitions.registry.export_runner:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Runner\ExportRunnerInterface
            - 'Export Definition Runners'

    data_definitions.registry.persister:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Persister\PersisterInterface
            - 'Import Definition Persisters'

    ### CLEANER
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Cleaner\Deleter:
        tags:
            - { name: data_definitions.cleaner, type: deleter }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Cleaner\None:
        tags:
            - { name: data_definitions.cleaner, type: none }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Cleaner\ReferenceCleaner:
        tags:
            - { name: data_definitions.cleaner, type: reference_cleaner }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Cleaner\Unpublisher:
        tags:
            - { name: data_definitions.cleaner, type: unpublisher }

    ### INTERPRETER
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\AssetsUrlInterpreter:
        arguments:
            - '@Psr\Http\Client\ClientInterface'
            - '@Psr\Http\Message\RequestFactoryInterface'
        tags:
            - { name: data_definitions.interpreter, type: assets_url, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\AssetsUrlInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\AssetUrlInterpreter:
        arguments:
            - '@Psr\Http\Client\ClientInterface'
            - '@Psr\Http\Message\RequestFactoryInterface'
        tags:
            - { name: data_definitions.interpreter, type: asset_url, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\AssetUrlInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\MetadataInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: metadata, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\MetadataInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\AssetByPathInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: asset_by_path, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\AssetByPathInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\CarbonInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: carbon, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\CarbonInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\CheckboxInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: checkbox, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\DefaultValueInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: default_value, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\DefaultValueInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\SpecificObjectInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: specific_object, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\SpecificObjectInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\HrefInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: href, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\HrefInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\MultiHrefInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: multi_href, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\MultiHrefInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\QuantityValueInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: quantity_value, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\QuantityValueInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\NestedInterpreter:
        arguments:
            - '@data_definitions.registry.interpreter'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactoryInterface'
        tags:
            - { name: data_definitions.interpreter, type: nested, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\NestedInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\ExpressionInterpreter:
        arguments:
            - '@opendxp_ecommerce.expression_language'
            - '@service_container'
        tags:
            - { name: data_definitions.interpreter, type: expression, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\ExpressionInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\ObjectResolverInterpreter:
        arguments:
            - '@service_container'
        tags:
            - { name: data_definitions.interpreter, type: object_resolver, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\ObjectResolverType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\DefinitionInterpreter:
        arguments:
            - '@data_definitions.repository.import_definition'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Importer\ImporterInterface'
        tags:
            - { name: data_definitions.interpreter, type: definition, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\DefinitionType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\ConditionalInterpreter:
        arguments:
            - '@data_definitions.registry.interpreter'
            - '@opendxp_ecommerce.expression_language'
            - '@service_container'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactoryInterface'
        tags:
            - { name: data_definitions.interpreter, type: conditional, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\ConditionalInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\MappingInterpreter:
        arguments:
            - '@service_container'
        tags:
            - { name: data_definitions.interpreter, type: mapping, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\MappingInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\IteratorInterpreter:
        arguments:
            - '@data_definitions.registry.interpreter'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Context\ContextFactoryInterface'
        tags:
            - { name: data_definitions.interpreter, type: iterator, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\IteratorInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\TwigInterpreter:
        arguments:
            - '@twig'
        tags:
            - { name: data_definitions.interpreter, type: twig, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\TwigInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\DoNotSetOnEmptyInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: donotsetonempty, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\TypeCastingInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: type_casting, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Interpreter\TypeCastingInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\LinkInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: link, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\ExternalImageInterpreter:
        tags:
            - { name: data_definitions.interpreter, type: external_image, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    ### PROVIDER
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\CsvProvider:
        arguments:
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Service\StorageLocator'
            - '@OpenDxp\Helper\LongRunningHelper'
        tags:
            - { name: data_definitions.import_provider, type: csv, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ImportProvider\CsvProviderType }
            - { name: data_definitions.export_provider, type: csv, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ExportProvider\CsvProviderType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\ExcelProvider:
        arguments:
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Service\StorageLocator'
            - '@OpenDxp\Helper\LongRunningHelper'
        tags:
            - { name: data_definitions.import_provider, type: excel, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ImportProvider\ExcelProviderType }
            - { name: data_definitions.export_provider, type: excel, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\JsonProvider:
        arguments:
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Service\StorageLocator'
            - '@OpenDxp\Helper\LongRunningHelper'
        tags:
            - { name: data_definitions.import_provider, type: json, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ImportProvider\JsonProviderType }
            - { name: data_definitions.export_provider, type: json, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\ExternalSqlProvider:
        tags:
            - { name: data_definitions.import_provider, type: external_sql, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ImportProvider\ExternalSqlProviderType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\SqlProvider:
        arguments:
            - '@doctrine.dbal.default_connection'
        tags:
            - { name: data_definitions.import_provider, type: sql, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ImportProvider\SqlProviderType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\XmlProvider:
        arguments:
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Service\StorageLocator'
            - '@OpenDxp\Helper\LongRunningHelper'
        tags:
            - { name: data_definitions.import_provider, type: xml, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ImportProvider\XmlProviderType }
            - { name: data_definitions.export_provider, type: xml, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ExportProvider\XmlProviderType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Provider\RawProvider:
        tags:
            - { name: data_definitions.import_provider, type: raw, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\ImportProvider\RawProviderType }

    ### SETTER AND GETTER
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\ClassificationStoreSetter:
        tags:
            - { name: data_definitions.setter, type: classificationstore, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\ClassificationStoreSetterType }
            - { name: data_definitions.getter, type: classificationstore, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\ClassificationStoreSetterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\ClassificationStoreFieldGetter:
        tags:
            - { name: data_definitions.getter, type: classificationstore_field, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\FieldCollectionSetter:
        tags:
            - { name: data_definitions.setter, type: fieldcollection, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\FieldCollectionSetterType }
            - { name: data_definitions.getter, type: fieldcollection, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\FieldCollectionSetterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\KeySetter:
        tags:
            - { name: data_definitions.setter, type: key, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\LocalizedfieldSetter:
        tags:
            - { name: data_definitions.setter, type: localizedfield, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\LocalizedFieldSetterType }
            - { name: data_definitions.getter, type: localizedfield, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\LocalizedFieldSetterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\ObjectbrickSetter:
        tags:
            - { name: data_definitions.setter, type: objectbrick, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\ObjectBrickSetterType }
            - { name: data_definitions.getter, type: objectbrick, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Setter\ObjectBrickSetterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\ObjectTypeSetter:
        tags:
            - { name: data_definitions.setter, type: object_type, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Setter\RelationSetter:
        tags:
            - { name: data_definitions.setter, type: relation, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\NoConfigurationType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\EventListener\ObjectDeleteListener:
        tags:
            - { name: kernel.event_listener, event: opendxp.dataobject.postDelete, method: onDataObjectDelete }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Fetcher\ObjectsFetcher:
        tags:
            - { name: data_definitions.fetcher, type: objects, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Form\Type\Fetcher\ObjectsFetcherType }

    ### LOADER
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Loader\PrimaryKeyLoader:
        tags:
            - { name: data_definitions.loader, type: primary_key }

    ### PERSISTER
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Persister\Persister:
        tags:
            - { name: data_definitions.persister, type: persister }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Service\StorageLocator:
        arguments:
            $locator: !tagged_locator { tag: flysystem.storage }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\EventListener\OpenDxpSettingsListener:
        tags:
            - { name: kernel.event_listener, event: opendxp.admin.indexAction.settings, method: indexSettings }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\EventListener\WriteableListener:
        tags:
            - { name: kernel.event_subscriber }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Messenger\ImportRowMessageHandler:
        arguments:
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Importer\ImporterInterface'
        tags:
            - { name: messenger.message_handler }
