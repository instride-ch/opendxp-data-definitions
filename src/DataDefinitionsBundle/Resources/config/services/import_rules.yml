parameters:
    data_definitions.form.type.import_rule.action.validation_groups: [ data_definitions ]
    data_definitions.form.type.import_rule.condition.validation_groups: [ data_definitions ]
    data_definitions.form.type.import_rule.validation_groups: [ data_definitions ]

services:
    data_definitions.import_rule.action:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        public: true
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Action\ImportRuleProcessorInterface
            - 'Import Rule Action Processors'

    data_definitions.form.import_rule.action:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    data_definitions.import_rule.condition:
        class: OpenDxp\Ecommerce\Component\Registry\ServiceRegistry
        public: true
        arguments:
            - Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Condition\ImportRuleConditionCheckerInterface
            - 'Import Rule Condition Checkers'

    data_definitions.form.import_rule.condition:
        class: OpenDxp\Ecommerce\Bundle\ResourceBundle\Form\Registry\FormTypeRegistry

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRuleActionChoiceType:
        arguments:
            - '%data_definitions.import_rule.actions%'
        tags:
            - { name: form.type }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRuleConditionChoiceType:
        arguments:
            - '%data_definitions.import_rule.conditions%'
        tags:
            - { name: form.type }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRuleActionCollectionType:
        arguments:
            - '@data_definitions.import_rule.action'
        tags:
            - { name: form.type }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRuleConditionCollectionType:
        arguments:
            - '@data_definitions.import_rule.condition'
        tags:
            - { name: form.type }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRuleActionType:
        arguments:
            - '%data_definitions.form.type.import_rule.action.validation_groups%'
            - '@data_definitions.form.import_rule.action'
        tags:
            - { name: form.type }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRuleConditionType:
        arguments:
            - '%data_definitions.form.type.definition.validation_groups%'
            - '@data_definitions.form.import_rule.condition'
        tags:
            - { name: form.type }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRuleType:
        arguments:
            - '%data_definitions.form.type.definition.validation_groups%'
        tags:
            - { name: form.type }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Condition\ExpressionConditionChecker:
        arguments:
            - '@opendxp_ecommerce.expression_language'
            - '@service_container'
        tags:
            - { name: data_definitions.import_rule.condition, type: expression, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\Condition\ExpressionConditionType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Action\ExpressionProcessor:
        arguments:
            - '@opendxp_ecommerce.expression_language'
            - '@service_container'
        tags:
            - { name: data_definitions.import_rule.action, type: expression, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\Action\ExpressionType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Action\ObjectProcessor:
        tags:
            - { name: data_definitions.import_rule.action, type: object, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\Action\ObjectType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\RuleApplierInterface: '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\RuleApplier'
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\RuleApplier:
        arguments:
            - '@data_definitions.import_rule.action'

    data_definitions.import_rules.conditions.validation.processor:
        class: OpenDxp\Ecommerce\Component\Rule\Condition\RuleConditionsValidationProcessor
        shared: false
        arguments:
            - '@data_definitions.import_rule.condition'
            - 'Import Rules Interface'

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\ImportRuleValidationProcessorInterface: '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\ImportRuleValidationProcessor'
    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\ImportRuleValidationProcessor:
        arguments:
            - '@data_definitions.import_rules.conditions.validation.processor'

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Interpreter\ImportRuleInterpreter:
        arguments:
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\ImportRuleValidationProcessorInterface'
            - '@Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Processor\RuleApplierInterface'
        tags:
            - { name: data_definitions.interpreter, type: import_rule, form-type: Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Rules\Form\Type\ImportRulesInterpreterType }

    Instride\Bundle\OpenDxpDataDefinitionsBundle\DataDefinitionsBundle\Controller\ImportRuleController:
        tags:
            - { name: controller.service_arguments }
