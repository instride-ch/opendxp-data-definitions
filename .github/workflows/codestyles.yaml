name: Code Styles

on:
  schedule:
    - cron: "0 2 * * MON" # Run at 2am every Monday
  workflow_dispatch: ~

jobs:
  coding-standard:
    name: "Coding standard refactor"
    runs-on: ubuntu-latest

    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        branch: ['main']

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ matrix.branch }}
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3

      - name: Install PHP dependencies
        run: composer update --no-interaction --no-scripts

      - name: Run ECS
        run: vendor/bin/ecs check --fix src

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'style: coding standard refactor'
          author: instride Bot <tools@instride.ch>
          title: '[CS] Refactor'
          body: |
            This PR has been generated automatically to fix code styles
          labels: |
            Enhancement
          branch: coding-standard/refactor-${{ matrix.branch }}
          delete-branch: true
          base: ${{ matrix.branch }}
