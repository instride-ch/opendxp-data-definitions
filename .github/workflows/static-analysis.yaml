name: Static Analysis

on:
  workflow_dispatch:
  pull_request:
    branches: ['main']
    paths-ignore:
      - 'docs/**'
      - 'etc/**'
      - 'vendor/**'
  push:
    branches: ['main']
    paths-ignore:
      - 'docs/**'
      - 'etc/**'
      - 'vendor/**'
  pull_request_target:
    branches: ['main']

permissions:
  contents: read

env:
  APP_ENV: "test"
  OPENDXP_PROJECT_ROOT: ${{ github.workspace }}
  OPENDXP_TEST_DB_DSN: "mysql://root:root@127.0.0.1:3306/test"

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.3, 8.4, 8.5]
        opendxp: [^1.0]
        dependencies: [highest]

    services:
      database:
        image: "mysql:8"
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    name: "OpenDXP ${{ matrix.opendxp }}, PHP ${{ matrix.php }}, Deps ${{ matrix.dependencies }}"

    steps:
      - name: Checkout PR head (only for pull_request_target)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Checkout PR head (for push or other events)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v7

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          ini-values: display_errors=On, display_startup_errors=On, error_reporting=32767
          extensions: intl, gd, simpleXML, dom, exif, fileinfo, iconv, mbstring, mysqli, pdo_mysql, zip, zlib

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - if: matrix.dependencies == 'highest'
        name: Install dependencies highest
        run: |
          composer req open-dxp/opendxp:${{ matrix.opendxp }} --no-interaction --no-scripts --no-update
          composer update --no-progress --prefer-dist --optimize-autoloader

      - if: matrix.dependencies == 'lowest'
        name: Install dependencies lowest
        run: |
          composer req open-dxp/opendxp:${{ matrix.opendxp }} --no-interaction --no-scripts --no-update
          composer update --no-progress --prefer-dist --optimize-autoloader --prefer-lowest

      - name: Validate YAML
        run: bin/console lint:yaml src --parse-tags

      - name: STAN
        run: |
          cp -f config/packages/stan/config.yaml config/packages/dev/config.yaml
          bin/console cache:clear --env=dev
          vendor/bin/phpstan analyse
