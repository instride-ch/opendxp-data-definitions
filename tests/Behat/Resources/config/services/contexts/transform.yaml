services:
    _defaults:
        public: true

    data_definitions.behat.context.transform.opendxp_class:
        class: Instride\Bundle\OpenDxpDataDefinitionsBundle\Behat\Context\Transform\OpenDxpClassContext
        arguments:
            - '@data_definitions.behat.shared_storage'
            - '@data_definitions.behat.class_storage'
        tags:
            - { name: fob.context_service }

    data_definitions.behat.context.transform.import_definition:
        class: Instride\Bundle\OpenDxpDataDefinitionsBundle\Behat\Context\Transform\ImportDefinitionContext
        arguments:
            - '@data_definitions.behat.shared_storage'
            - '@data_definitions.repository.import_definition'
        tags:
            - { name: fob.context_service }

    data_definitions.behat.context.transform.opendxp_asset:
        class: Instride\Bundle\OpenDxpDataDefinitionsBundle\Behat\Context\Transform\OpenDxpAssetContext
        tags:
            - { name: fob.context_service }
